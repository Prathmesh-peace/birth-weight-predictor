<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Baby Birth Weight Predictor</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}

body{
height:100vh;
background: linear-gradient(135deg,#6dd5ed,#2193b0);
display:flex;
align-items:center;
justify-content:center;
}

.container{
background:white;
padding:40px;
width:380px;
border-radius:15px;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

h1{
text-align:center;
margin-bottom:30px;
color:#333;
}

label{
font-weight:600;
color:#444;
font-size:14px;
}

input{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:18px;
border:1px solid #ccc;
border-radius:8px;
font-size:14px;
transition:0.3s;
}

input:focus{
border-color:#2193b0;
outline:none;
box-shadow:0 0 5px rgba(33,147,176,0.3);
}

button{
width:100%;
padding:13px;
background:#2193b0;
border:none;
border-radius:8px;
font-size:16px;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#176d86;
transform:scale(1.03);
}

.footer{
text-align:center;
margin-top:15px;
font-size:12px;
color:#777;
}

</style>

</head>

<body>

<div class="container">

<h1>👶 Baby Weight Predictor</h1>

<form action="/predict" method="POST">

<label>Gestation</label> <input name="gestation" type="number" placeholder="Enter gestation weeks" required>

<label>Parity</label> <input name="parity" type="number" placeholder="Enter parity value" required>

<label>Age</label> <input name="age" type="number" placeholder="Enter mother's age" required>

<label>Height</label> <input name="height" type="number" placeholder="Enter height (cm)" required>

<label>Weight</label> <input name="weight" type="number" placeholder="Enter weight (kg)" required>

<label>Smoke</label> <input name="smoke" type="number" placeholder="0 = No, 1 = Yes" required>

<button type="submit">Predict Baby Weight</button>

</form>

<h3>Predicted Birth Weight : {{prediction}}</h3>
<div class="footer">
Machine Learning Prediction System
</div>

</div>

</body>
</html>
